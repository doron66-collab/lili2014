<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 64" width="48" height="64">
  <!-- CGU Flame mark — stylised torch/flame in CGU maroon (#8B1A1A) -->
  <defs>
    <linearGradient id="flameGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"  stop-color="#6B0F0F"/>
      <stop offset="50%" stop-color="#8B1A1A"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="innerFlame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"  stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <!-- Torch handle -->
  <rect x="20" y="46" width="8" height="14" rx="2" fill="#6B0F0F"/>
  <!-- Outer flame -->
  <path d="M24 2
    C18 8, 8 14, 10 26
    C11 33, 16 36, 20 34
    C17 30, 16 24, 20 20
    C20 27, 24 30, 24 44
    C24 30, 28 27, 28 20
    C32 24, 31 30, 28 34
    C32 36, 37 33, 38 26
    C40 14, 30 8, 24 2Z"
    fill="url(#flameGrad)"/>
  <!-- Inner flame highlight -->
  <path d="M24 12
    C21 17, 17 21, 19 27
    C20 30, 22 31, 24 32
    C26 31, 28 30, 29 27
    C31 21, 27 17, 24 12Z"
    fill="url(#innerFlame)" opacity="0.75"/>
</svg>
