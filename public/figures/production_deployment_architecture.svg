<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#06b6d4"/>
    </marker>
  </defs>
  <rect width="960" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#0B1E3D">SOLANGE — Production Deployment Architecture</text>
  <text x="480" y="46" text-anchor="middle" font-size="11" fill="#64748b">Pull-only agents, installed once by IT — the end user never sees a terminal</text>

  <!-- End User -->
  <rect x="360" y="66" width="240" height="52" rx="8" fill="#f1f5f9" stroke="#0B1E3D" stroke-width="1.5"/>
  <text x="480" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#0B1E3D">End User</text>
  <text x="480" y="104" text-anchor="middle" font-size="10" fill="#334155">Clinician / researcher — browser only</text>

  <!-- User <-> SOLANGE -->
  <line x1="480" y1="118" x2="480" y2="156" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- SOLANGE (vendor-hosted) -->
  <rect x="270" y="158" width="420" height="92" rx="8" fill="#e0f2fe" stroke="#0B1E3D" stroke-width="1.5"/>
  <text x="480" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#0B1E3D">SOLANGE (vendor-hosted)</text>
  <text x="480" y="197" text-anchor="middle" font-size="10" fill="#334155">Netlify (UI) · Render (API) · Supabase (DB)</text>
  <!-- LEON badge -->
  <rect x="360" y="210" width="240" height="30" rx="6" fill="#0B1E3D"/>
  <text x="480" y="229" text-anchor="middle" font-size="10" font-weight="700" fill="#f1f5f9">LEON — verifies P8 seal at ingestion</text>

  <!-- Customer infrastructure boundary -->
  <rect x="40" y="290" width="880" height="230" rx="10" fill="none" stroke="#94a3b8" stroke-width="1.25" stroke-dasharray="6,4"/>
  <text x="60" y="312" font-size="10.5" font-weight="700" fill="#64748b">CUSTOMER'S OWN INFRASTRUCTURE / SECURITY PERIMETER</text>

  <!-- HPC Cluster box -->
  <rect x="70" y="330" width="360" height="160" rx="8" fill="#f8fafc" stroke="#0B1E3D" stroke-width="1.25"/>
  <text x="250" y="352" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0B1E3D">Customer HPC Cluster</text>
  <rect x="100" y="368" width="300" height="90" rx="6" fill="#f1f5f9" stroke="#06b6d4" stroke-width="1.25"/>
  <text x="250" y="392" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0B1E3D">HPC / DMRG Agent</text>
  <text x="250" y="408" text-anchor="middle" font-size="9.5" fill="#334155">persistent background service</text>
  <text x="250" y="422" text-anchor="middle" font-size="9.5" fill="#334155">(systemd / batch-scheduler managed)</text>
  <text x="250" y="440" text-anchor="middle" font-size="9" fill="#64748b">installed once by cluster IT admin</text>

  <!-- QPU-Access Host box -->
  <rect x="530" y="330" width="360" height="160" rx="8" fill="#f8fafc" stroke="#0B1E3D" stroke-width="1.25"/>
  <text x="710" y="352" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0B1E3D">QPU-Access Host</text>
  <rect x="560" y="368" width="300" height="90" rx="6" fill="#f1f5f9" stroke="#E8A020" stroke-width="1.25"/>
  <text x="710" y="392" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0B1E3D">QPU Agent</text>
  <text x="710" y="408" text-anchor="middle" font-size="9.5" fill="#334155">persistent background service</text>
  <text x="710" y="422" text-anchor="middle" font-size="9.5" fill="#334155">(systemd / launchd / container)</text>
  <text x="710" y="440" text-anchor="middle" font-size="9" fill="#64748b">installed once by IT admin</text>

  <!-- Agents -> SOLANGE (outbound only, pull) -->
  <line x1="250" y1="368" x2="420" y2="252" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="300" font-size="9.5" fill="#0e7490" transform="rotate(-40 270 300)">poll queue / push result</text>

  <line x1="710" y1="368" x2="540" y2="252" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="300" font-size="9.5" fill="#0e7490" transform="rotate(40 700 300)" text-anchor="end">poll queue / push result</text>

  <!-- No inbound note -->
  <text x="480" y="278" text-anchor="middle" font-size="9.5" font-weight="700" fill="#dc2626">✕ no inbound path — SOLANGE never reaches into customer infrastructure</text>

  <!-- IBM Quantum (external) -->
  <rect x="600" y="540" width="220" height="56" rx="8" fill="#fef3e2" stroke="#E8A020" stroke-width="1.5"/>
  <text x="710" y="562" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0B1E3D">IBM Quantum</text>
  <text x="710" y="578" text-anchor="middle" font-size="9.5" fill="#334155">external — real QPU hardware</text>

  <line x1="710" y1="490" x2="710" y2="538" stroke="#E8A020" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="722" y="516" font-size="9.5" fill="#a16207">submit / poll</text>
</svg>
